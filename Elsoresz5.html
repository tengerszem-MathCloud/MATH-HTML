<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematika Feladatsor - 2. verzió</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        glass: "rgba(255, 255, 255, 0.4)",
                        glassBorder: "rgba(255, 255, 255, 0.5)",
                    }
                }
            }
        }
    </script>

    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        body {
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            color: #1e293b;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const quizData = [
            {
                id: 1, points: 2,
                text: "Adott két halmaz: $A = \\{1; 2; 3; 4; 5\\}$ és $B = \\{2; 4; 6; 8\\}$. Elemei felsorolásával adja meg az $A \\setminus B$ halmazt! <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Csak a számokat adja meg pontosvesszővel elválasztva, növekvő sorrendben! Pl: 1; 2; 3)</span>",
                correctAnswers: ["1; 3; 5", "1, 3, 5", "1;3;5", "1,3,5", "{1; 3; 5}", "{1;3;5}"],
                explanation: "$A \\setminus B = \\{1; 3; 5\\}$. Azok az elemek, amelyek benne vannak $A$-ban, de nincsenek benne $B$-ben."
            },
            {
                id: 2, points: 2,
                text: "Egy sportcipő eredeti ára $24\\,000$ Ft. Egy akció keretében az árát $15\\%$-kal csökkentik. Mennyi lesz a cipő akciós ára?",
                correctAnswers: ["20400", "20 400", "20.400", "20400 ft", "20 400 ft", "20400ft"],
                explanation: "Az árcsökkenés utáni ár az eredeti $85\\%$-a. $24\\,000 \\cdot 0,85 = 20\\,400$ Ft."
            },
            {
                id: 3, points: 2,
                text: "Egy hatpontú egyszerű gráf minden csúcsának fokszáma $3$. Hány éle van ennek a gráfnak?",
                correctAnswers: ["9", "9 él", "9 el"],
                explanation: "A fokszámok összege $6 \\cdot 3 = 18$. A fokszámösszeg az élek számának kétszerese, így az élek száma: $\\frac{18}{2} = 9$."
            },
            {
                id: 4, points: 3,
                text: "Egy számtani sorozat első tagja $a_1 = 5$, differenciája $d = 3$. Számítsa ki a sorozat első $10$ tagjának összegét ($S_{10}$)! <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Csak a végeredményt írja be!)</span>",
                correctAnswers: ["185"],
                explanation: "Kiszámolható a 10. tag: $a_{10} = 5 + 9 \\cdot 3 = 32$. Az összegképlet felírása: $S_{10} = \\frac{5 + 32}{2} \\cdot 10 = 185$."
            },
            {
                id: 5, points: 2,
                text: "Adja meg az $f(x) = \\sqrt{x - 3}$ függvény értelmezési tartományát a valós számok halmazán! <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Relációs jellel adja meg a választ szóközök nélkül! Pl: x>=5)</span>",
                correctAnswers: ["x>=3", "x >= 3", "x\\ge3", "x=>3"],
                explanation: "A négyzetgyök alatt nem állhat negatív szám, így $x - 3 \\ge 0$. Megoldás: $x \\ge 3$ (vagy intervallummal: $[3; \\infty[$)."
            },
            {
                id: 6, points: 2,
                text: "Hány különböző ötjegyű szám készíthető az $1, 2, 3, 4, 5$ számjegyekből, ha minden számjegyet pontosan egyszer használhatunk fel?",
                correctAnswers: ["120", "120 db", "120 darab", "120 fele", "120 féle"],
                explanation: "A lehetséges sorrendek (permutációk) száma: $5! = 120$."
            },
            {
                id: 7, points: 3,
                text: "Egy derékszögű háromszög két befogója $5$ cm és $12$ cm hosszú. Mekkora a háromszög köré írható kör sugara?",
                correctAnswers: ["6,5", "6.5", "6,5 cm", "6.5 cm", "6,5cm"],
                explanation: "A Pitagorasz-tétel alkalmazásával az átfogó $c = 13$ cm. A Thalész-tétel értelmében a köré írható kör sugara az átfogó fele: $R = \\frac{13}{2} = 6,5$ cm."
            },
            {
                id: 8, points: 2,
                text: "Döntse el, hogy a következő állítás igaz vagy hamis, és röviden indokolja válaszát: \"Minden prímszám páratlan.\" <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Írja be a logikai értéket, majd pontosvessző után egyetlen számmal az ellenpéldát! Pl: Hamis; 8)</span>",
                correctAnswers: ["hamis; 2", "hamis, 2", "hamis;2", "hamis,2", "hamis; a 2"],
                explanation: "A logikai érték: Hamis. Indoklás: Például a $2$ prímszám, de páros szám."
            },
            {
                id: 9, points: 3,
                text: "Egy dobozban $4$ piros és $6$ kék golyó van. Visszatevés nélkül egymás után kihúzunk két golyót. Mennyi a valószínűsége annak, hogy mindkét kihúzott golyó piros? <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Válaszát tört alakban, perjelel elválasztva adja meg! Pl: 1/2)</span>",
                correctAnswers: ["2/15", "12/90", "6/45"],
                explanation: "A valószínűség kiszámítható úgy is, hogy az első és második húzást szorozzuk: $\\frac{4}{10} \\cdot \\frac{3}{9} = \\frac{12}{90} = \\frac{2}{15}$."
            },
            {
                id: 10, points: 3,
                text: "Egy egyenlő szárú háromszög alapja $10$ cm, a szárszöge $40^\\circ$. Milyen hosszúak a háromszög szárai? <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Válaszát két tizedesjegyre kerekítve adja meg! Csak a számot írja be.)</span>",
                correctAnswers: ["14,62", "14.62", "14,62 cm", "14.62 cm", "14,62cm"],
                explanation: "A magasság felezi az alapot ($5$ cm) és a szárszöget ($20^\\circ$) is. $\\sin(20^\\circ) = \\frac{5}{b}$, amiből a szár hossza: $b = \\frac{5}{\\sin(20^\\circ)} \\approx 14,62$ cm."
            },
            {
                id: 11, points: 3,
                text: "Oldja meg a valós számok halmazán a $\\log_2(x) + \\log_2(3) = \\log_2(15)$ egyenletet!",
                correctAnswers: ["5", "x=5", "x = 5"],
                explanation: "A logaritmus azonosságának alkalmazása: $\\log_2(3x) = \\log_2(15)$. A kölcsönösen egyértelműség miatt: $3x = 15$, így $x = 5$."
            },
            {
                id: 12, points: 3,
                text: "Írja fel annak az egyenesnek az egyenletét, amely áthalad a $P(2; -1)$ ponton, és normálvektora $\\vec{n}(3; 4)$! <br><span class='text-sm text-indigo-700 font-semibold'>(Utasítás: Az egyenletet szóközök nélkül adja meg! Pl: 3x+4y=2)</span>",
                correctAnswers: ["3x+4y=2", "3x+4y-2=0", "4y+3x=2"],
                explanation: "Az egyenes egyenletének felírásához használható az $n_1 x + n_2 y = n_1 x_0 + n_2 y_0$ képlet. Behelyettesítve: $3x + 4y = 3 \\cdot 2 + 4 \\cdot (-1)$. Az egyenlet: $3x + 4y = 2$."
            }
        ];

        const App = () => {
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            const totalPoints = quizData.reduce((acc, q) => acc + q.points, 0);

            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise();
                }
            });

            const checkAnswer = (question, userAnswer) => {
                if (!userAnswer) return false;
                
                const cleanUser = userAnswer.toLowerCase().replace(/\s/g, '');
                return question.correctAnswers.some(ans => 
                    ans.toLowerCase().replace(/\s/g, '') === cleanUser
                );
            };

            const handleInputChange = (questionId, value) => {
                if(isSubmitted) return;
                setAnswers({ ...answers, [questionId]: value });
            };

            const handleSubmit = () => {
                let currentScore = 0;
                quizData.forEach(q => {
                    if (checkAnswer(q, answers[q.id])) {
                        currentScore += q.points;
                    }
                });
                setScore(currentScore);
                setIsSubmitted(true);
            };

            const scorePercentage = Math.round((score / totalPoints) * 100) || 0;

            return (
                <div className="max-w-4xl mx-auto pb-12">
                    <div className="sticky top-4 z-50 glass-card rounded-2xl p-6 mb-8 text-center transition-all duration-500">
                        <h1 className="text-3xl font-bold text-slate-800 mb-2">Matematika Érettségi Feladatsor</h1>
                        
                        {isSubmitted ? (
                            <div className="mt-4">
                                <div className="text-2xl font-semibold mb-2 text-indigo-900">
                                    Eredmény: {score} / {totalPoints} pont ({scorePercentage}%)
                                </div>
                                <div className="w-full bg-white/50 rounded-full h-4">
                                    <div 
                                        className="bg-indigo-500 h-4 rounded-full transition-all duration-1000 ease-out" 
                                        style={{ width: `${scorePercentage}%` }}>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <p className="text-slate-600 font-medium">Oldd meg a feladatokat, írd be a válaszokat, majd nyomd meg a Kiértékelés gombot!</p>
                        )}
                    </div>

                    <div className="space-y-6">
                        {quizData.map((q, index) => {
                            const userAnswer = answers[q.id] || "";
                            const isCorrect = isSubmitted ? checkAnswer(q, userAnswer) : null;
                            
                            let cardBorder = "border-white/40";
                            if (isSubmitted) {
                                cardBorder = isCorrect ? "border-green-400 bg-green-50/20" : "border-red-400 bg-red-50/20";
                            }

                            return (
                                <div key={q.id} className={`glass-card rounded-2xl p-6 transition-all duration-300 ${cardBorder}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <h2 className="text-lg font-bold text-slate-800 flex-1">
                                            {index + 1}. feladat
                                        </h2>
                                        <span className="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded ml-3 shrink-0">
                                            {q.points} pont
                                        </span>
                                    </div>
                                    
                                    <p className="text-slate-700 mb-5 text-lg" dangerouslySetInnerHTML={{ __html: q.text }} />

                                    <div className="mb-4">
                                        <input 
                                            type="text" 
                                            disabled={isSubmitted}
                                            value={userAnswer}
                                            onChange={(e) => handleInputChange(q.id, e.target.value)}
                                            placeholder="Írd ide a végeredményt..."
                                            className="w-full md:w-3/4 px-4 py-3 rounded-lg border border-white/50 bg-white/50 focus:bg-white/80 focus:outline-none focus:ring-2 focus:ring-indigo-400 transition-colors disabled:opacity-70 text-lg"
                                        />
                                    </div>

                                    {isSubmitted && (
                                        <div className={`mt-4 p-4 rounded-xl ${isCorrect ? 'bg-green-100/70 border border-green-200' : 'bg-red-100/70 border border-red-200'}`}>
                                            <div className="flex items-center mb-2">
                                                <span className="text-xl mr-2">{isCorrect ? '✅' : '❌'}</span>
                                                <span className={`font-bold ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                                                    {isCorrect ? `Helyes válasz! Megkaptad a ${q.points} pontot.` : 'Helytelen válasz!'}
                                                </span>
                                            </div>
                                            <div className="text-slate-700 mt-2">
                                                <strong className="block mb-1">Javítási útmutató / Magyarázat:</strong>
                                                <span dangerouslySetInnerHTML={{ __html: q.explanation }} />
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {!isSubmitted && (
                        <div className="mt-8 text-center">
                            <button 
                                onClick={handleSubmit}
                                className="bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold py-3 px-10 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 text-xl"
                            >
                                Kiértékelés
                            </button>
                        </div>
                    )}
                    
                    {isSubmitted && (
                        <div className="mt-8 text-center">
                            <button 
                                onClick={() => window.location.reload()}
                                className="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-10 rounded-full shadow-lg transform hover:scale-105 transition-all duration-300 text-xl"
                            >
                                Újrapróbálom
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
